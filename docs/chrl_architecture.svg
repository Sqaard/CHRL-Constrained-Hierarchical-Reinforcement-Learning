<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #17202a; }
      .label { font: 700 16px Arial, sans-serif; fill: #17202a; }
      .text { font: 14px Arial, sans-serif; fill: #2d3436; }
      .small { font: 12px Arial, sans-serif; fill: #485460; }
      .box { fill: #ffffff; stroke: #2f7d63; stroke-width: 2; rx: 10; }
      .box-blue { fill: #f4f8ff; stroke: #4c78a8; stroke-width: 2; rx: 10; }
      .box-orange { fill: #fff7f0; stroke: #b85c38; stroke-width: 2; rx: 10; }
      .box-gray { fill: #f7f7f7; stroke: #7f8c8d; stroke-width: 2; rx: 10; }
      .arrow { stroke: #2d3436; stroke-width: 2.4; marker-end: url(#arrowhead); fill: none; }
      .dash { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3436"/>
    </marker>
  </defs>

  <text x="40" y="44" class="title">CHRL Model: Constrained Hierarchical Reinforcement Learning</text>
  <text x="40" y="72" class="text">A portfolio policy decomposed into monthly risk control, group routing, and weekly stock execution.</text>

  <rect x="45" y="120" width="210" height="105" class="box-gray"/>
  <text x="70" y="150" class="label">Market & Portfolio State</text>
  <text x="70" y="178" class="text">macro context</text>
  <text x="70" y="200" class="text">risk regime</text>
  <text x="70" y="222" class="text">current weights</text>

  <rect x="330" y="105" width="230" height="135" class="box-blue"/>
  <text x="360" y="138" class="label">Risk Layer</text>
  <text x="360" y="166" class="text">cash vs risky exposure</text>
  <text x="360" y="190" class="small">update: 20 trading days</text>
  <text x="360" y="214" class="small">logs: cash target, risk target</text>

  <rect x="635" y="105" width="230" height="135" class="box"/>
  <text x="665" y="138" class="label">Group Layer</text>
  <text x="665" y="166" class="text">cluster / sector pressure</text>
  <text x="665" y="190" class="small">soft routing context</text>
  <text x="665" y="214" class="small">logs: group pressure, caps</text>

  <rect x="635" y="300" width="230" height="145" class="box-orange"/>
  <text x="665" y="333" class="label">Stock Layer</text>
  <text x="665" y="361" class="text">buy/sell candidates</text>
  <text x="665" y="385" class="small">update: 5 trading days</text>
  <text x="665" y="409" class="small">logs: Top-K, stock confidence</text>
  <text x="665" y="433" class="small">output: executed weights</text>

  <rect x="900" y="190" width="175" height="170" class="box-gray"/>
  <text x="925" y="222" class="label">Constraints</text>
  <text x="925" y="252" class="text">confidence slice</text>
  <text x="925" y="276" class="text">event triggers</text>
  <text x="925" y="300" class="text">Top-K routing</text>
  <text x="925" y="324" class="text">buy gate</text>

  <rect x="330" y="365" width="230" height="100" class="box-gray"/>
  <text x="360" y="397" class="label">Behavior Logs</text>
  <text x="360" y="425" class="text">raw → scheduled → executed</text>
  <text x="360" y="449" class="text">primitive labels after training</text>

  <path d="M255 172 C285 172, 300 172, 330 172" class="arrow"/>
  <path d="M560 172 C590 172, 605 172, 635 172" class="arrow"/>
  <path d="M750 240 C750 265, 750 275, 750 300" class="arrow"/>
  <path d="M865 372 C895 372, 890 275, 900 275" class="dash"/>
  <path d="M750 445 C700 505, 445 505, 445 465" class="dash"/>
  <path d="M445 365 C445 305, 445 255, 445 240" class="dash"/>

  <text x="585" y="505" class="small">Dashed arrows show feedback/logging used for interpretability and later primitive analysis.</text>
</svg>
